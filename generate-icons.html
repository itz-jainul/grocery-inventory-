<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title>
<style>
    body { font-family: 'Inter', sans-serif; background: #0b0d12; color: #f3f4f6; padding: 30px; }
    h2 { color: #a78bfa; }
    .icon-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
    .icon-item { background: #181c2b; border-radius: 12px; padding: 16px; text-align: center; }
    .icon-item p { margin: 8px 0 4px; font-weight: 600; font-size: 0.85rem; }
    .icon-item a { color: #8b5cf6; font-size: 0.8rem; }
    canvas { border-radius: 8px; }
    .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: linear-gradient(135deg, #8b5cf6, #a78bfa); color: #fff; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .btn:hover { transform: translateY(-2px); }
    .status { margin-top: 12px; color: #10b981; font-size: 0.85rem; }
</style>
</head>
<body>
<h2>🎨 GroceryVault Icon Generator</h2>
<p>Click "Download All" to save all PNG icons to your downloads folder, then move them to the <code>icons/</code> folder.</p>
<button class="btn" onclick="downloadAll()">⬇ Download All Icons</button>
<div class="status" id="status"></div>
<div class="icon-grid" id="iconGrid"></div>

<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];

function generateIcon(size) {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    // Background gradient
    const gradient = ctx.createLinearGradient(0, 0, size, size);
    gradient.addColorStop(0, '#8b5cf6');
    gradient.addColorStop(1, '#a78bfa');

    // Rounded rectangle background
    const r = size * 0.18;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();

    // Draw shopping bag icon
    ctx.save();
    ctx.translate(size / 2, size / 2);
    const scale = size / 100;

    ctx.strokeStyle = '#ffffff';
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 3 * scale;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Bag top
    ctx.beginPath();
    ctx.moveTo(-18 * scale, -12 * scale);
    ctx.lineTo(-22 * scale, -22 * scale);
    ctx.lineTo(22 * scale, -22 * scale);
    ctx.lineTo(18 * scale, -12 * scale);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Bag body
    ctx.beginPath();
    ctx.moveTo(-18 * scale, -12 * scale);
    ctx.lineTo(-18 * scale, 22 * scale);
    ctx.quadraticCurveTo(-18 * scale, 26 * scale, -14 * scale, 26 * scale);
    ctx.lineTo(14 * scale, 26 * scale);
    ctx.quadraticCurveTo(18 * scale, 26 * scale, 18 * scale, 22 * scale);
    ctx.lineTo(18 * scale, -12 * scale);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Bag handle
    ctx.beginPath();
    ctx.arc(0, -12 * scale, 10 * scale, Math.PI, 0, false);
    ctx.stroke();

    // Checkmark
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 3.5 * scale;
    ctx.beginPath();
    ctx.moveTo(-8 * scale, 8 * scale);
    ctx.lineTo(-2 * scale, 15 * scale);
    ctx.lineTo(10 * scale, 2 * scale);
    ctx.stroke();

    ctx.restore();
    return canvas;
}

// Display all icons
const grid = document.getElementById('iconGrid');
sizes.forEach(size => {
    const canvas = generateIcon(size);
    const div = document.createElement('div');
    div.className = 'icon-item';
    div.innerHTML = `<p>icon-${size}x${size}.png</p>`;
    div.appendChild(canvas);
    const link = document.createElement('a');
    link.download = `icon-${size}x${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.textContent = `Download`;
    link.style.display = 'block';
    link.style.marginTop = '8px';
    div.appendChild(link);
    grid.appendChild(div);
});

function downloadAll() {
    const status = document.getElementById('status');
    sizes.forEach((size, i) => {
        setTimeout(() => {
            const canvas = generateIcon(size);
            const link = document.createElement('a');
            link.download = `icon-${size}x${size}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            status.textContent = `Downloaded ${i + 1}/${sizes.length} icons...`;
            if (i === sizes.length - 1) {
                status.textContent = `✅ All ${sizes.length} icons downloaded! Move them to the icons/ folder.`;
            }
        }, i * 300);
    });
}
</script>
</body>
</html>
